<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0891b2">
  <title>浮力闯关小游戏</title>
  <link rel="stylesheet" href="/style.css?v=20260523">
  <script defer src="/app.js?v=20260523"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Buoyancy Lab Game</p>
      <h1>浮力闯关小游戏</h1>
      <p class="intro">调节物体和液体，让小方块“漂浮、悬浮或下沉”。边玩边看懂：浮力、重力、密度和排开液体体积。</p>
    </section>

    <section class="panel mission" aria-live="polite">
      <div>
        <span class="tag">第 <b id="levelNo">1</b> 关</span>
        <h2 id="targetText">让木块漂浮在水面上</h2>
        <p id="hintText">密度小于液体时，物体通常会漂浮。</p>
      </div>
      <div class="scorebox">
        <span>得分</span><b id="score">0</b>
      </div>
    </section>

    <section class="grid">
      <section class="panel lab">
        <canvas id="scene" width="720" height="480" aria-label="浮力实验水槽"></canvas>
        <div class="result" id="result">点击“开始实验”，观察物体在液体中的状态。</div>
        <div class="actions">
          <button id="runBtn" type="button">开始实验</button>
          <button id="nextBtn" class="ghost" type="button">下一关</button>
        </div>
      </section>

      <section class="panel controls" aria-label="实验参数">
        <label>物体材料
          <select id="material">
            <option value="wood">木头 0.60 g/cm³</option>
            <option value="ice">冰块 0.92 g/cm³</option>
            <option value="plastic">塑料 1.10 g/cm³</option>
            <option value="brick">砖块 1.80 g/cm³</option>
            <option value="iron">铁块 7.80 g/cm³</option>
          </select>
        </label>
        <label>液体
          <select id="liquid">
            <option value="oil">食用油 0.80 g/cm³</option>
            <option value="water" selected>清水 1.00 g/cm³</option>
            <option value="salt">盐水 1.20 g/cm³</option>
            <option value="honey">蜂蜜 1.40 g/cm³</option>
          </select>
        </label>
        <label>物体体积 <span id="volumeVal">120</span> cm³
          <input id="volume" type="range" min="60" max="220" value="120">
        </label>
        <label>空心程度 <span id="hollowVal">0</span>%
          <input id="hollow" type="range" min="0" max="70" value="0">
        </label>
        <div class="formula">
          <b>观察公式</b>
          <p>浮力 F<sub>浮</sub> = ρ<sub>液</sub> × g × V<sub>排</sub></p>
          <p>重力 G = ρ<sub>物</sub> × g × V<sub>物</sub></p>
          <p id="numbers">调好参数后开始实验。</p>
        </div>
      </section>
    </section>

    <section class="panel tips">
      <h2>闯关目标</h2>
      <ul id="levelList"></ul>
    </section>

    <footer>寒雨佳泽 3620007@QQ.com 2026年5月23日</footer>
  </main>
</body>
</html>
