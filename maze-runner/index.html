<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070b24">
  <title>霓虹迷宫大冒险</title>
  <link rel="stylesheet" href="/style.css?v=20260523">
  <script defer src="/app.js?v=20260523"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Neon Maze Quest</p>
      <h1>霓虹迷宫大冒险</h1>
      <p class="intro">操控霓虹机器人找到钥匙、收集能量宝石、躲开红色陷阱，冲进出口！键盘方向键 / WASD / 贴近迷宫的手机按钮都能玩。</p>
    </section>

    <section class="hud panel">
      <div><span>关卡</span><b id="level">1</b></div>
      <div><span>时间</span><b id="time">0.0</b></div>
      <div><span>宝石</span><b><i id="gems">0</i>/<i id="gemTotal">0</i></b></div>
      <div><span>钥匙</span><b id="keyState">未拿</b></div>
      <button id="newBtn" type="button">新迷宫 ✨</button>
    </section>

    <section class="grid">
      <section class="panel board-wrap">
        <canvas id="board" width="720" height="720" aria-label="霓虹迷宫游戏画面"></canvas>
        <div class="status" id="status">先拿钥匙，再去发光出口。小心红色陷阱！</div>
        <div class="play-controls" aria-label="贴近迷宫的手机方向控制">
          <button id="up" type="button">▲</button>
          <button id="left" type="button">◀</button>
          <button id="down" type="button">▼</button>
          <button id="right" type="button">▶</button>
        </div>
      </section>

      <section class="panel side">
        <h2>任务</h2>
        <ul>
          <li>🗝️ 找到钥匙，打开出口</li>
          <li>💎 收集宝石加分</li>
          <li>🌀 传送门会把你送到另一边</li>
          <li>⚡ 红色陷阱会扣时间</li>
        </ul>
        <div class="score-card">
          <span>当前得分</span>
          <b id="score">0</b>
        </div>
      </section>
    </section>

    <footer>寒雨佳泽 3620007@QQ.com 2026年5月23日</footer>
  </main>
</body>
</html>
