<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>数学口算训练</title>
  <link rel="stylesheet" href="/style.css?v=20260522">
  <script defer src="/app.js?v=20260522"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Math Quick Trainer</p>
      <h1>数学口算训练</h1>
      <p class="intro">每天 3 分钟，练习四则运算、分数与小数。适合中小学生课前热身和家庭陪练。</p>
    </section>

    <section class="panel controls" aria-label="练习设置">
      <label>题型
        <select id="mode">
          <option value="mix">综合四则</option>
          <option value="add">加减法</option>
          <option value="mul">乘除法</option>
          <option value="decimal">小数练习</option>
          <option value="fraction">分数比较</option>
        </select>
      </label>
      <label>难度
        <select id="level">
          <option value="easy">轻松</option>
          <option value="normal" selected>标准</option>
          <option value="hard">挑战</option>
        </select>
      </label>
      <button id="startBtn" type="button">开始练习</button>
    </section>

    <section class="panel quiz" aria-live="polite">
      <div class="stats">
        <span>得分 <b id="score">0</b></span>
        <span>连对 <b id="streak">0</b></span>
        <span>时间 <b id="time">90</b>s</span>
      </div>
      <div id="question" class="question">点击“开始练习”生成第一题</div>
      <form id="answerForm" class="answer-row">
        <input id="answer" inputmode="decimal" autocomplete="off" placeholder="输入答案，如 12 或 0.5">
        <button type="submit">提交</button>
      </form>
      <div id="feedback" class="feedback">支持键盘与手机输入，答案会自动记录到错题本。</div>
    </section>

    <section class="panel review">
      <h2>错题回顾</h2>
      <ul id="mistakes"><li>暂无错题，保持专注！</li></ul>
      <button id="clearBtn" type="button" class="ghost">清空错题</button>
    </section>

    <footer>寒雨佳。3620007@QQ.com 2026年5月23日</footer>
  </main>
</body>
</html>
