<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2b145f">
  <title>成语接龙练习器</title>
  <link rel="stylesheet" href="/style.css?v=20260523">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">中文 · 成语 · 接龙</p>
      <h1>成语接龙练习器</h1>
      <p class="lead">从一个成语出发，用“上一个成语的最后一个字”接出下一个成语。练反应，也练积累。</p>
      <div class="stats" aria-label="练习统计">
        <span><b id="score">0</b> 分</span>
        <span><b id="streak">0</b> 连对</span>
        <span><b id="timer">60</b> 秒</span>
      </div>
    </section>

    <section class="board">
      <div class="prompt-card">
        <span class="tag" id="modeTag">限时挑战</span>
        <p class="small">请接：</p>
        <div class="current" id="currentIdiom">一马当先</div>
        <p class="hint">下一个成语要以 <strong id="targetChar">先</strong> 开头</p>
      </div>

      <form id="answerForm" class="answer" autocomplete="off">
        <input id="answerInput" type="text" inputmode="text" placeholder="输入成语，例如：先声夺人" aria-label="输入要接的成语">
        <button type="submit">提交</button>
      </form>

      <div class="tools">
        <button id="hintBtn" type="button">给我提示</button>
        <button id="skipBtn" type="button">换一个</button>
        <button id="restartBtn" type="button">重新开始</button>
      </div>

      <div class="message" id="message">准备好了吗？输入一个以“先”开头的成语。</div>
    </section>

    <section class="panels">
      <article class="panel">
        <h2>可选答案</h2>
        <div id="suggestions" class="chips"></div>
      </article>
      <article class="panel">
        <h2>接龙记录</h2>
        <ol id="history" class="history"></ol>
      </article>
      <article class="panel tips">
        <h2>玩法说明</h2>
        <ul>
          <li>答案必须在内置成语库里，并且不能重复。</li>
          <li>答对 +10 分，连续答对有额外奖励。</li>
          <li>点“给我提示”会显示 3 个可接成语。</li>
        </ul>
      </article>
    </section>

    <footer>寒雨佳泽 3620007@QQ.com 2026年5月23日</footer>
  </main>
  <script defer src="/app.js?v=20260523"></script>
</body>
</html>
