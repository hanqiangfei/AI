<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070816" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Neon Snake</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="title-row">
          <div>
            <p class="eyebrow">Cyber Arcade</p>
            <h1>Neon Snake</h1>
          </div>
          <button id="restart" class="ghost-button" type="button">重开</button>
        </div>

        <div class="stats">
          <div><span>Score</span><strong id="score">0</strong></div>
          <div><span>Best</span><strong id="best">0</strong></div>
          <div><span>Status</span><strong id="status">待开始</strong></div>
        </div>

        <canvas id="board" aria-label="贪吃蛇游戏画布"></canvas>

        <div class="controls" aria-label="移动端方向控制">
          <button type="button" data-dir="up">↑</button>
          <div>
            <button type="button" data-dir="left">←</button>
            <button id="pause" type="button">▶</button>
            <button type="button" data-dir="right">→</button>
          </div>
          <button type="button" data-dir="down">↓</button>
        </div>

        <p class="hint">键盘：方向键 / WASD 控制，空格暂停，Enter 重开。手机可用下方按钮。</p>

        <footer class="signature">作者：韩睿泽 日期：2026年5月22日</footer>
      </section>
    </main>
    <link rel="stylesheet" href="/src/styles.css?v=4" />
    <script defer src="/src/main.js?v=4"></script>
  </body>
</html>
